{% extends 'base.html' %}

{% block content %}
<div class="home-container">
    <div class="hero">
        <h1>🌸 Welcome to Blossom & Grow</h1>
        <p>Your cozy little corner to track and care for your plants!</p>
        {% if user.is_authenticated %}
            <a href="{% url 'plant_index' %}" class="btn">Go to My Garden 🌿</a>
        {% else %}
            <a href="{% url 'signup' %}" class="btn">Get Started 🌱</a>
            <a href="{% url 'login' %}" class="btn btn-outline">Log In</a>
        {% endif %}
    </div>
</div>
{% endblock %}
