<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blossom & Grow 🌸</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<link rel="icon" type="image/png" href="{% static 'images/blossom_and_grow_logo.png' %}">
<body>
    <nav>
        <a href="{% url 'home' %}" class="nav-logo">
        <img src="{% static 'images/blossom_and_grow_logo.png' %}" alt="Blossom & Grow logo" />
        <span>Blossom & Grow</span>
        </a>
        <div class="nav-links">
            {% if user.is_authenticated %}
                <a href="{% url 'plant_index' %}">My Garden</a>
                <a href="{% url 'plant_create' %}">+ Add Plant</a>
                <form method="POST" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit">Log Out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Log In</a>
                <a href="{% url 'signup' %}">Sign Up</a>
            {% endif %}
        </div>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>🌱 Blossom & Grow — Made with love</p>
    </footer>
</body>
</html>
