{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h1>🌸 Welcome Back!</h1>
    <p>Log in to visit your garden!</p>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="form-actions">
            <button type="submit" class="btn">Log In 🌿</button>
        </div>
    </form>

    <p class="auth-switch">Don't have an account? <a href="{% url 'signup' %}">Sign up here!</a></p>
</div>
{% endblock %}
